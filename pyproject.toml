[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "rural_doc_env"
version = "0.1.0"
description = "Rural Indian PHC diagnostic simulator for LLM agents"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "websockets>=12.0",
    "httpx>=0.27",
    "openai>=1.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "httpx",
]

[project.scripts]
rural-doc-server   = "server.app:main"
rural-doc-validate = "validate:main"
rural-doc-infer    = "inference:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
